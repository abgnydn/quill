<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Dark squircle background (Apple-style 22% corner radius) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1f2a"/>
      <stop offset="100%" stop-color="#0a0b10"/>
    </linearGradient>
    <linearGradient id="nib-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e3"/>
      <stop offset="55%" stop-color="#f4ecd6"/>
      <stop offset="100%" stop-color="#d8cfb6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle inner highlight on the squircle (very faint) -->
  <rect x="6" y="6" width="1012" height="1012" rx="222" ry="222"
        fill="none" stroke="rgba(244,236,214,0.06)" stroke-width="2"/>

  <!-- Nib body: vertical sides taper to a point at bottom -->
  <g filter="url(#soft)">
    <path d="M 332 200
             L 692 200
             L 692 600
             L 512 854
             L 332 600
             Z"
          fill="url(#nib-shine)"/>

    <!-- Breather hole (circle near upper-middle) -->
    <circle cx="512" cy="510" r="42" fill="#0a0b10"/>

    <!-- Slit running from circle down to the tip -->
    <path d="M 512 552 L 512 850"
          stroke="#0a0b10" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- One coral accent — a single tiny ink mark, brand consistency -->
  <!-- (subtle; only visible at large sizes, gone at 16/32px which is fine) -->
  <circle cx="512" cy="510" r="14" fill="#ff6b4a" opacity="0.95"/>
</svg>
