<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quill</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>quill</h1>
      <span class="meta" id="status">ready</span>
      <span class="caps" id="caps"></span>
    </header>
    <main>
      <section class="editor-pane">
        <textarea
          id="editor"
          placeholder="Type or paste text. Suggestions appear on the right."
          spellcheck="false"
          autofocus
        >This is an test of the Harper grammer checker. I has a apple.</textarea>
        <div class="actions">
          <button id="rewrite-btn" disabled title="Run the local LLM rewriter on the current text">
            ✎ Rewrite
          </button>
          <span class="hint" id="rewrite-hint"></span>
        </div>
        <div class="rewrite-output hidden" id="rewrite-output">
          <div class="rewrite-label">rewrite</div>
          <div class="rewrite-text" id="rewrite-text"></div>
          <div class="rewrite-actions">
            <button id="rewrite-apply">Apply</button>
            <button id="rewrite-dismiss">Dismiss</button>
          </div>
        </div>
      </section>
      <aside id="suggestions">
        <div class="empty">no suggestions yet</div>
      </aside>
    </main>
    <section id="personal">
      <div class="personal-row">
        <div class="personal-stats">
          <div class="personal-headline">
            <strong id="personal-count">0</strong>
            <span>edits learned from you</span>
            <span id="personal-pill" class="pill pill-base">base only</span>
          </div>
          <div class="personal-detail" id="personal-detail">
            <span><b id="personal-applied">0</b> applied · <b id="personal-rewrite">0</b> rewrites</span>
            <span id="personal-range"></span>
          </div>
        </div>
        <div class="personal-actions">
          <button id="personal-train" title="Run the Modal training job + auto-install the adapter" disabled>↻ Train</button>
          <button id="personal-export" title="Export as JSONL for the train pipeline">⤓ Export</button>
          <button id="personal-clear" title="Wipe the journal" class="danger">⌫ Reset</button>
        </div>
      </div>
      <div id="train-modal" class="train-modal hidden">
        <div class="train-card">
          <div class="train-state" id="train-state">starting…</div>
          <div class="train-elapsed" id="train-elapsed"></div>
          <div class="train-stage" id="train-stage"></div>
          <div class="train-error" id="train-error"></div>
          <div class="train-actions">
            <button id="train-install" class="primary hidden">✓ Install + relaunch</button>
            <button id="train-dismiss">Close</button>
          </div>
        </div>
      </div>
      <div class="personal-note">
        Your edits stay on this device. Used to train a personal LoRA adapter
        — never sent anywhere. <a href="https://github.com/abgnydn/quill" target="_blank">how this works</a>
      </div>
    </section>
    <script src="main.js"></script>
  </body>
</html>
