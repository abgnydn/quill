<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nib Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="underlines"></div>

    <div id="fallback">
      <div class="fb-header" id="fb-header">Nib</div>
      <div id="fb-list"></div>
    </div>

    <div id="popover" role="dialog" aria-label="Nib suggestion">
      <div class="pop-bulk" id="pop-bulk" hidden>
        <button class="pop-bulk-btn accept" id="pop-bulk-accept" title="Apply the first suggestion of every lint">Accept all</button>
        <button class="pop-bulk-btn dismiss" id="pop-bulk-dismiss" title="Close this popover">Dismiss all</button>
        <span class="pop-bulk-count" id="pop-bulk-count"></span>
      </div>
      <div class="pop-kind" id="pop-kind"></div>
      <div class="pop-msg" id="pop-msg"></div>
      <div class="pop-suggs" id="pop-suggs"></div>
      <div class="pop-why-wrap" id="pop-why-wrap">
        <button class="pop-why-toggle" id="pop-why-toggle" aria-expanded="false">Why?</button>
        <div class="pop-why-body" id="pop-why-body" hidden></div>
      </div>
      <!-- AI rewrite was moved out of the hover popover in v1.1.2.
           Select text → click the blue ↓ trigger → use the dedicated
           rewrite panel. The hover popover is purely word-level now. -->
    </div>

    <!-- #corner removed: the floating chip cluttered the desktop. The
         menubar tray icon is the only ambient presence Nib needs. -->

    <!-- Selection trigger — small blue ↓ button anchored to the left
         of the user's text selection. Click opens the rewrite panel. -->
    <button id="sel-trigger" type="button" aria-label="Rewrite selection" hidden>
      <span class="sel-trigger-arrow">↓</span>
    </button>

    <!-- Selection-scoped rewrite panel (independent of the hover popover).
         Opens via the selection trigger; closes on dismiss or apply. -->
    <div id="rewrite-panel" role="dialog" aria-label="Rewrite selection" hidden>
      <div class="rp-head">
        <span class="rp-title">Rewrite selection</span>
        <button class="rp-x" id="rp-close" aria-label="Close">×</button>
      </div>
      <div class="rp-source" id="rp-source"></div>
      <!-- Live badge showing the instruction we'll send to the model
           (composed from the active tone+formality chips). Hidden when
           no chips are active. -->
      <div class="rp-instr" id="rp-instr" hidden></div>

      <!-- Tone × formality picker chips. Click one in each row to bias
           the rewrite; click again to deselect (clears to neutral). -->
      <div class="rp-tone-row" id="rp-tone-row">
        <span class="rp-row-label">tone</span>
        <button class="rp-chip" data-tone="confident">confident</button>
        <button class="rp-chip" data-tone="engaging">engaging</button>
        <button class="rp-chip" data-tone="direct">direct</button>
        <button class="rp-chip" data-tone="witty">witty</button>
        <button class="rp-chip" data-tone="personable">personable</button>
        <button class="rp-chip" data-tone="empathetic">empathetic</button>
      </div>
      <div class="rp-tone-row" id="rp-formality-row">
        <span class="rp-row-label">formality</span>
        <button class="rp-chip" data-formality="casual">casual</button>
        <button class="rp-chip" data-formality="neutral">neutral</button>
        <button class="rp-chip" data-formality="formal">formal</button>
      </div>

      <div class="rp-out-wrap">
        <div class="rp-streaming" id="rp-streaming" hidden></div>
        <div class="rp-out" id="rp-out"></div>
      </div>
      <div class="rp-actions">
        <button class="rp-btn rp-go" id="rp-go">Rewrite</button>
        <button class="rp-btn rp-apply" id="rp-apply" hidden>✓ Apply</button>
        <button class="rp-btn rp-regen" id="rp-regen" hidden>↻ Regenerate</button>
      </div>
    </div>

    <script src="overlay.js"></script>
  </body>
</html>
