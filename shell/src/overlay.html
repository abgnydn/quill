<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nib Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="underlines"></div>

    <div id="fallback">
      <div class="fb-header" id="fb-header">Nib</div>
      <div id="fb-list"></div>
    </div>

    <div id="popover" role="dialog" aria-label="Nib suggestion">
      <div class="pop-bulk" id="pop-bulk" hidden>
        <button class="pop-bulk-btn accept" id="pop-bulk-accept" title="Apply the first suggestion of every lint">Accept all</button>
        <button class="pop-bulk-btn dismiss" id="pop-bulk-dismiss" title="Close this popover">Dismiss all</button>
        <span class="pop-bulk-count" id="pop-bulk-count"></span>
      </div>
      <div class="pop-kind" id="pop-kind"></div>
      <div class="pop-msg" id="pop-msg"></div>
      <div class="pop-suggs" id="pop-suggs"></div>
      <div class="pop-why-wrap" id="pop-why-wrap">
        <button class="pop-why-toggle" id="pop-why-toggle" aria-expanded="false">Why?</button>
        <div class="pop-why-body" id="pop-why-body" hidden></div>
      </div>
      <div class="pop-ai">
        <span class="pop-ai-label">whole sentence</span>
        <button class="ai-btn" id="ai-btn">
          <span class="spinner" id="ai-btn-spinner" style="display:none"></span>
          <span id="ai-btn-label">Rewrite with AI</span>
        </button>
      </div>
      <div class="ai-out" id="ai-out">
        <div id="ai-text"></div>
        <div class="row">
          <button class="sugg" id="ai-apply">✓ Apply</button>
          <button class="sugg" id="ai-dismiss">Dismiss</button>
        </div>
      </div>
    </div>

    <!-- #corner removed: the floating chip cluttered the desktop. The
         menubar tray icon is the only ambient presence Nib needs. -->

    <script src="overlay.js"></script>
  </body>
</html>
