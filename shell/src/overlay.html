<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quill Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="underlines"></div>

    <div id="fallback">
      <div class="fb-header" id="fb-header">Quill</div>
      <div id="fb-list"></div>
    </div>

    <div id="popover" role="dialog" aria-label="Quill suggestion">
      <div class="pop-kind" id="pop-kind"></div>
      <div class="pop-msg" id="pop-msg"></div>
      <div class="pop-suggs" id="pop-suggs"></div>
      <div class="pop-ai">
        <span class="pop-ai-label">whole sentence</span>
        <button class="ai-btn" id="ai-btn">
          <span class="spinner" id="ai-btn-spinner" style="display:none"></span>
          <span id="ai-btn-label">Rewrite with AI</span>
        </button>
      </div>
      <div class="ai-out" id="ai-out">
        <div id="ai-text"></div>
        <div class="row">
          <button class="sugg" id="ai-apply">✓ Apply</button>
          <button class="sugg" id="ai-dismiss">Dismiss</button>
        </div>
      </div>
    </div>

    <div id="corner">Quill</div>

    <script src="overlay.js"></script>
  </body>
</html>
